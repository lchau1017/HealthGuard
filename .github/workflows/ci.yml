name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: >-
          ./gradlew
          :core:domain:jvmTest
          :core:data:jvmTest
          :core:ui:testDebugUnitTest
          :app:testDebugUnitTest
          :backend:server:test
          :app:lintDebug
          :core:ui:lintDebug
          :app:assembleDebug
